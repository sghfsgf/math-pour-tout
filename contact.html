<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - SGH Maths Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="nav-container">
        <div class="logo">
                  <span>Maths Academy</span>
        </div>
        <div class="menu-toggle">&#9776;</div>
        <nav id="mainNav">
            <a href="index.html">Accueil</a>
            <a href="college.html">Collège</a>
            <a href="lycee.html">Lycée</a>
            <a href="primaire.html">Primaire</a>
            <a href="conseils.html">Conseils</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="content contact-section">
        <h1>Contactez-nous</h1>
        <p>Pour toute question ou suggestion, utilisez le formulaire ci-dessous :</p>

        <!-- Formulaire via Formsubmit.co -->
        <form action="https://formsubmit.co/esghaier.information@gmail.com" method="POST" enctype="multipart/form-data">
            <!-- Redirection vers page Merci -->
            <input type="hidden" name="_next" value="merci.html">
            <input type="hidden" name="_captcha" value="false">

            <label for="name">Nom :</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email">

            <label for="message">Message :</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <label for="attachment">Joindre un fichier :</label>
            <input type="file" id="attachment" name="attachment" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">

            <button type="submit">Envoyer</button>
        </form>
    </div>
</main>

<footer class="site-footer">
    Copyright 2026 SGH pour Maths Academy
</footer>

<script>
    // Menu hamburger mobile
    const toggleMenu = () => {
        const nav = document.getElementById("mainNav");
        nav.style.display = nav.style.display === "flex" ? "none" : "flex";
    }
    document.querySelector(".menu-toggle").addEventListener("click", toggleMenu);
</script>
</body>
</html>
