<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primaire - Maths Academy</title>

<link rel="stylesheet" href="style.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f4e79">

<style>

/* STRUCTURE */
.container{
    display:flex;
    gap:20px;
    width:95%;
    margin:20px auto;
}

.sidebar{
    min-width:220px;
    background:#2e75b6;
    padding:20px;
    border-radius:10px;
    color:white;
}

.sidebar h3{
    margin-top:0;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar li{
    margin:12px 0;
}

.sidebar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.sidebar a:hover{
    text-decoration:underline;
}

.content{
    flex:1;
    background:white;
    padding:20px;
    border-radius:10px;
}

/* PDF */
.pdf-list a{
    display:block;
    margin:8px 0;
    padding:10px;
    background:#eaf2fb;
    border-radius:8px;
    text-decoration:none;
    color:#1f4e79;
    font-weight:bold;
}

.pdf-list a:hover{
    background:#cfe2f7;
}

/* Responsive */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
}

</style>
</head>
<body>

<header>
<div class="nav-container">

<div class="logo">Maths Academy</div>

</div>
